name: fineract-frontend-v2
run-name: fineract-frontend-v2-${{ github.ref_name }}-${{ github.run_number }}

on:
  push:
    branches:
      - main
      - develop
      - hotfix/*
      - release/*
    paths-ignore:
      - 'helm/**'
      - '.github/**'
  pull_request:
    branches:
      - main
      - develop
      - release/*

env:
  SHOULD_PUBLISH: ${{ github.ref  == 'refs/heads/main' ||  github.ref == 'refs/heads/develop' || startsWith(github.ref , 'refs/heads/release') || startsWith(github.ref , 'refs/heads/hotfix/') }}
  IS_RELEASE: ${{ github.ref  == 'refs/heads/main' }}
  ARTIFACT_NAME: fineract-frontend-v2

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 18

      - name: Angular CLI install
        run: npm install -g --silent @angular/cli@13.3.10

      - name: Set image tag & other env variables
        id: set-env
        run: |
          VERSION_TAG=$(sed 's/.*"version": "\(.*\)".*/\1/;t;d' ./package.json)
          echo "VERSION_TAG=$VERSION_TAG"

          echo "Is Release=$IS_RELEASE"

          if [ $IS_RELEASE == 'true' ]; then
            echo "This is a release"
            IMAGE_TAGS=$VERSION_TAG
          else
            echo "This is a normal build"
            IMAGE_TAGS="${VERSION_TAG}.$(date '+%Y.%m.%d').${{ github.run_number }}"
          fi
          echo "Tags: $IMAGE_TAGS"

          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT

      - name: Install Node Packages
        run: npm install

      - name: Login to Azure registry
        uses: docker/login-action@v4.2.0
        if: ${{ env.SHOULD_PUBLISH == 'true'}}
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ vars.ACR_PULL_USERNAME }}
          password: ${{ secrets.ACR_PULL_PASSWORD }}

      - name: Docker Build & Push
        uses: docker/build-push-action@v7.2.0
        with:
          push: ${{ env.SHOULD_PUBLISH == 'true'}}
          tags: |
            ${{ vars.ACR_REGISTRY }}/oneacrefund/fineract-frontend-v2:${{ steps.set-env.outputs.IMAGE_TAGS }}
            ${{ vars.ACR_REGISTRY }}/oneacrefund/fineract-frontend-v2:latest
          context: ${{ github.workspace }}

      - name: Use latest image tag
        run: yq -i '.image.tag = "${{ steps.set-env.outputs.IMAGE_TAGS }}"' ${{ github.workspace }}/deployment/values.yaml

      - name: Publish configuration package
        uses: actions/upload-artifact@v7.0.1
        if: ${{ env.SHOULD_PUBLISH == 'true'}}
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ github.workspace }}/deployment

      - name: Commit and push updated image tag
        if: ${{ env.SHOULD_PUBLISH == 'true'}}
        env:
          IMAGE_TAG: ${{ steps.set-env.outputs.IMAGE_TAGS }}
        run: |
          git config user.name "oneacrefund-automation"
          git config user.email "oneacrefund-automation@users.noreply.github.com"
          git remote set-url origin "https://oneacrefund-automation:${{ secrets.GA_TOKEN }}@github.com/${{ github.repository }}.git"

          git fetch origin develop
          git checkout develop

          update_values() {
            local ENV=$1
            local FILE="helm/values-${ENV}.yaml"

            yq -i ".image.tag = \"${IMAGE_TAG}\"" "$FILE"
            git add "$FILE"
            echo "Staged $FILE with tag ${IMAGE_TAG}"
          }

          case "${{ github.ref }}" in
            refs/heads/develop)
              update_values dev
              update_values qa
              update_values uat
              ;;
            refs/heads/release/*)
              update_values dev
              update_values qa
              update_values uat
              ;;
            refs/heads/hotfix/*)
              update_values uat
              update_values production
              ;;
            refs/heads/main)
              update_values dev
              update_values qa
              update_values uat
              update_values production
              ;;
          esac

          if git diff --cached --quiet; then
            echo "No changes to commit — all envs already at ${IMAGE_TAG}"
            exit 0
          fi

          git commit -m "chore(release): update image tag to ${IMAGE_TAG} [skip ci]

          Source branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}"
          git push origin develop

  QualityCheck:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Lint and Unit Tests
        continue-on-error: true
        run: npm run test:ci

      - name: Test Coverage
        continue-on-error: true
        run: npm run test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: "${{ secrets.SONAR_TOKEN }}"

  Integration:
    if: github.event.ref == 'refs/heads/main' || github.event.ref == 'refs/heads/develop' || contains(github.event.ref, 'refs/heads/hotfix/') || contains(github.event.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    needs: [Build, QualityCheck]
    environment:
      name: Integration
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Helm
        uses: one-acre-fund/oaf-actions/helm_setup@1.0.0
        with:
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          RUN_ID: "${{ github.run_id }}"
          CI_REPOSITORY: "${{ github.repository }}"
          K8S_URL: "${{ secrets.K8S_TEST_URL }}"
          K8S_SECRET: "${{ secrets.K8S_TEST_DEFAULT }}"

      - name: Deploy using Helm
        uses: "./.github/actions/helm_fineract_frontend"
        with:
          NAMESPACE: "${{ vars.NAMESPACE }}"
          ACR_REGISTRY: "${{ vars.ACR_REGISTRY }}"
          ACR_PULL_PASSWORD: "${{ secrets.ACR_PULL_PASSWORD }}"
          ACR_PULL_USERNAME: "${{ vars.ACR_PULL_USERNAME }}"
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          REPLICAS: "${{ vars.REPLICAS }}"
          RELEASE_NAME: "${{ vars.RELEASE_NAME }}"
          FINERACT_PROXY_URL: "${{ vars.FINERACT_PROXY_URL }}"
          FINERACT_PROXY_HTTPS_PORT: "${{ vars.FINERACT_PROXY_HTTPS_PORT }}"
          FINERACT_PROXY_HTTP_PORT: "${{ vars.FINERACT_PROXY_HTTP_PORT }}"
          FINERACT_KEYCLOAK_REALM: "${{ vars.FINERACT_KEYCLOAK_REALM }}"
          FINERACT_KEYCLOAK_CLIENT_ID: "${{ vars.FINERACT_KEYCLOAK_CLIENT_ID }}"
          FINERACT_KEYCLOAK_TOKEN_URL: "${{ vars.FINERACT_KEYCLOAK_TOKEN_URL }}"
          FINERACT_KEYCLOAK_AUTH_SERVER_URL: "${{ vars.FINERACT_KEYCLOAK_AUTH_SERVER_URL }}"
          FINERACT_KEYCLOAK_API_URL: "${{ vars.FINERACT_KEYCLOAK_API_URL }}"
          FINERACT_HOST_HOME_URL: "${{ vars.FINERACT_HOST_HOME_URL }}"
          FINERACT_BASE_URL: "${{ vars.FINERACT_BASE_URL }}"
          FINERACT_AUTH_URL: "${{ vars.FINERACT_AUTH_URL }}"
          FINERACT_API_URL: "${{ vars.FINERACT_API_URL }}"
          MATOMO_SITE_ID: "${{ vars.MATOMO_SITE_ID }}"
          MATOMO_SITE_URL: "${{ vars.MATOMO_SITE_URL }}"
          SENTRY_DSN: "${{ secrets.SENTRY_DSN }}"
          APM_SERVER_URL: "${{ vars.APM_SERVER_URL }}"
          APM_ACTIVE: "${{ vars.APM_ACTIVE }}"

  QA:
    runs-on: ubuntu-latest
    needs: Integration
    if: github.event.ref == 'refs/heads/main' || github.event.ref == 'refs/heads/develop' || contains(github.event.ref, 'refs/heads/hotfix/') || contains(github.event.ref, 'refs/heads/release/')
    environment:
      name: QA
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Helm
        uses: one-acre-fund/oaf-actions/helm_setup@1.0.0
        with:
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          RUN_ID: "${{ github.run_id }}"
          CI_REPOSITORY: "${{ github.repository }}"
          K8S_URL: "${{ secrets.K8S_QA_URL }}"
          K8S_SECRET: "${{ secrets.K8S_QA_DEFAULT }}"

      - name: Deploy using Helm
        uses: "./.github/actions/helm_fineract_frontend"
        with:
          NAMESPACE: "${{ vars.NAMESPACE }}"
          ACR_REGISTRY: "${{ vars.ACR_REGISTRY }}"
          ACR_PULL_PASSWORD: "${{ secrets.ACR_PULL_PASSWORD }}"
          ACR_PULL_USERNAME: "${{ vars.ACR_PULL_USERNAME }}"
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          REPLICAS: "${{ vars.REPLICAS }}"
          RELEASE_NAME: "${{ vars.RELEASE_NAME }}"
          FINERACT_PROXY_URL: "${{ vars.FINERACT_PROXY_URL }}"
          FINERACT_PROXY_HTTPS_PORT: "${{ vars.FINERACT_PROXY_HTTPS_PORT }}"
          FINERACT_PROXY_HTTP_PORT: "${{ vars.FINERACT_PROXY_HTTP_PORT }}"
          FINERACT_KEYCLOAK_REALM: "${{ vars.FINERACT_KEYCLOAK_REALM }}"
          FINERACT_KEYCLOAK_CLIENT_ID: "${{ vars.FINERACT_KEYCLOAK_CLIENT_ID }}"
          FINERACT_KEYCLOAK_TOKEN_URL: "${{ vars.FINERACT_KEYCLOAK_TOKEN_URL }}"
          FINERACT_KEYCLOAK_AUTH_SERVER_URL: "${{ vars.FINERACT_KEYCLOAK_AUTH_SERVER_URL }}"
          FINERACT_KEYCLOAK_API_URL: "${{ vars.FINERACT_KEYCLOAK_API_URL }}"
          FINERACT_HOST_HOME_URL: "${{ vars.FINERACT_HOST_HOME_URL }}"
          FINERACT_BASE_URL: "${{ vars.FINERACT_BASE_URL }}"
          FINERACT_AUTH_URL: "${{ vars.FINERACT_AUTH_URL }}"
          FINERACT_API_URL: "${{ vars.FINERACT_API_URL }}"
          MATOMO_SITE_ID: "${{ vars.MATOMO_SITE_ID }}"
          MATOMO_SITE_URL: "${{ vars.MATOMO_SITE_URL }}"
          SENTRY_DSN: "${{ secrets.SENTRY_DSN }}"
          APM_SERVER_URL: "${{ vars.APM_SERVER_URL }}"
          APM_ACTIVE: "${{ vars.APM_ACTIVE }}"

  UAT:
    runs-on: ubuntu-latest
    if: github.event.ref == 'refs/heads/main' || contains(github.event.ref, 'refs/heads/hotfix/') || contains(github.event.ref, 'refs/heads/release/')
    needs: [Build, QualityCheck]
    environment:
      name: UAT
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Helm
        uses: one-acre-fund/oaf-actions/helm_setup@1.0.0
        with:
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          RUN_ID: "${{ github.run_id }}"
          CI_REPOSITORY: "${{ github.repository }}"
          K8S_URL: "${{ secrets.K8S_UAT_URL }}"
          K8S_SECRET: "${{ secrets.K8S_UAT_DEFAULT }}"

      - name: Deploy using Helm
        uses: "./.github/actions/helm_fineract_frontend"
        with:
          NAMESPACE: "${{ vars.NAMESPACE }}"
          ACR_REGISTRY: "${{ vars.ACR_REGISTRY }}"
          ACR_PULL_PASSWORD: "${{ secrets.ACR_PULL_PASSWORD }}"
          ACR_PULL_USERNAME: "${{ vars.ACR_PULL_USERNAME }}"
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          REPLICAS: "${{ vars.REPLICAS }}"
          RELEASE_NAME: "${{ vars.RELEASE_NAME }}"
          FINERACT_PROXY_URL: "${{ vars.FINERACT_PROXY_URL }}"
          FINERACT_PROXY_HTTPS_PORT: "${{ vars.FINERACT_PROXY_HTTPS_PORT }}"
          FINERACT_PROXY_HTTP_PORT: "${{ vars.FINERACT_PROXY_HTTP_PORT }}"
          FINERACT_KEYCLOAK_REALM: "${{ vars.FINERACT_KEYCLOAK_REALM }}"
          FINERACT_KEYCLOAK_CLIENT_ID: "${{ vars.FINERACT_KEYCLOAK_CLIENT_ID }}"
          FINERACT_KEYCLOAK_TOKEN_URL: "${{ vars.FINERACT_KEYCLOAK_TOKEN_URL }}"
          FINERACT_KEYCLOAK_AUTH_SERVER_URL: "${{ vars.FINERACT_KEYCLOAK_AUTH_SERVER_URL }}"
          FINERACT_KEYCLOAK_API_URL: "${{ vars.FINERACT_KEYCLOAK_API_URL }}"
          FINERACT_HOST_HOME_URL: "${{ vars.FINERACT_HOST_HOME_URL }}"
          FINERACT_BASE_URL: "${{ vars.FINERACT_BASE_URL }}"
          FINERACT_AUTH_URL: "${{ vars.FINERACT_AUTH_URL }}"
          FINERACT_API_URL: "${{ vars.FINERACT_API_URL }}"
          MATOMO_SITE_ID: "${{ vars.MATOMO_SITE_ID }}"
          MATOMO_SITE_URL: "${{ vars.MATOMO_SITE_URL }}"
          SENTRY_DSN: "${{ secrets.SENTRY_DSN }}"
          APM_SERVER_URL: "${{ vars.APM_SERVER_URL }}"
          APM_ACTIVE: "${{ vars.APM_ACTIVE }}"

  Production:
    runs-on: ubuntu-latest
    needs: UAT
    if: github.event.ref == 'refs/heads/main' || contains(github.event.ref, 'refs/heads/hotfix/') || contains(github.event.ref, 'refs/heads/release/')
    environment:
      name: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Helm
        uses: one-acre-fund/oaf-actions/helm_setup@1.0.0
        with:
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          RUN_ID: "${{ github.run_id }}"
          CI_REPOSITORY: "${{ github.repository }}"
          K8S_URL: "${{ secrets.K8S_PROD_URL }}"
          K8S_SECRET: "${{ secrets.K8S_PROD_DEFAULT }}"

      - name: Deploy using Helm
        uses: "./.github/actions/helm_fineract_frontend"
        with:
          NAMESPACE: "${{ vars.NAMESPACE }}"
          ACR_REGISTRY: "${{ vars.ACR_REGISTRY }}"
          ACR_PULL_PASSWORD: "${{ secrets.ACR_PULL_PASSWORD }}"
          ACR_PULL_USERNAME: "${{ vars.ACR_PULL_USERNAME }}"
          ARTIFACT_NAME: "${{ env.ARTIFACT_NAME }}"
          REPLICAS: "${{ vars.REPLICAS }}"
          RELEASE_NAME: "${{ vars.RELEASE_NAME }}"
          FINERACT_PROXY_URL: "${{ vars.FINERACT_PROXY_URL }}"
          FINERACT_PROXY_HTTPS_PORT: "${{ vars.FINERACT_PROXY_HTTPS_PORT }}"
          FINERACT_PROXY_HTTP_PORT: "${{ vars.FINERACT_PROXY_HTTP_PORT }}"
          FINERACT_KEYCLOAK_REALM: "${{ vars.FINERACT_KEYCLOAK_REALM }}"
          FINERACT_KEYCLOAK_CLIENT_ID: "${{ vars.FINERACT_KEYCLOAK_CLIENT_ID }}"
          FINERACT_KEYCLOAK_TOKEN_URL: "${{ vars.FINERACT_KEYCLOAK_TOKEN_URL }}"
          FINERACT_KEYCLOAK_AUTH_SERVER_URL: "${{ vars.FINERACT_KEYCLOAK_AUTH_SERVER_URL }}"
          FINERACT_KEYCLOAK_API_URL: "${{ vars.FINERACT_KEYCLOAK_API_URL }}"
          FINERACT_HOST_HOME_URL: "${{ vars.FINERACT_HOST_HOME_URL }}"
          FINERACT_BASE_URL: "${{ vars.FINERACT_BASE_URL }}"
          FINERACT_AUTH_URL: "${{ vars.FINERACT_AUTH_URL }}"
          FINERACT_API_URL: "${{ vars.FINERACT_API_URL }}"
          MATOMO_SITE_ID: "${{ vars.MATOMO_SITE_ID }}"
          MATOMO_SITE_URL: "${{ vars.MATOMO_SITE_URL }}"
          SENTRY_DSN: "${{ secrets.SENTRY_DSN }}"
          APM_SERVER_URL: "${{ vars.APM_SERVER_URL }}"
          APM_ACTIVE: "${{ vars.APM_ACTIVE }}"
