<div class="container m-b-20" fxLayout="row" fxLayoutAlign="end" fxLayoutGap="20px">
  <button mat-raised-button color="primary" [routerLink]="'create'" *mifosxHasPermission="'UPDATE_CURRENCY'">
    <fa-icon icon="plus"></fa-icon>&nbsp;&nbsp;
    {{ 'labels.buttons.Add/Edit' | translate }}
  </button>
</div>

<div class="container">
  <div fxLayout="row" fxLayoutGap="20px">
    <mat-form-field fxFlex>
      <mat-label>{{ 'labels.buttons.Filter' | translate }}</mat-label>
      <input matInput (keyup)="applyFilter($event.target.value)" />
    </mat-form-field>
  </div>

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Currency Name' | translate }}</th>
        <td mat-cell *matCellDef="let currency">{{ currency.name }}</td>
      </ng-container>

      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Currency Code' | translate }}</th>
        <td mat-cell *matCellDef="let currency">{{ currency.code }}</td>
      </ng-container>

      <ng-container matColumnDef="country">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Country' | translate }}</th>
        <td mat-cell *matCellDef="let currency">{{ currency.countryName }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>{{ 'labels.inputs.Actions' | translate }}</th>
        <td mat-cell *matCellDef="let currency">
          <button
            type="button"
            mat-raised-button
            color="warn"
            *ngIf="currency.active === true"
            (click)="deactivateCurrency(currency.currencyId, false, currency.code)"
          >
            <fa-icon icon="trash"></fa-icon>&nbsp;&nbsp;{{ 'labels.buttons.Deactivate' | translate }}
          </button>
          <button
            type="button"
            mat-raised-button
            color="primary"
            *ngIf="currency.active === false"
            (click)="deactivateCurrency(currency.currencyId, true, currency.code)"
          >
            <em class="fa fa-unlock-alt"></em>&nbsp;&nbsp;{{ 'labels.buttons.Activate' | translate }}
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
