  <div fxLayout="row wrap" fxLayoutGap="2%" fxLayout.lt-md="column">

          <mat-label>Country</mat-label>

              <mat-option *ngFor="let country of countries" [value]="country.id" [class.hide]="!isFiltered(country)">
                {{country.name}}

    <div fxFlex="52%">
      <label for="country">{{ 'labels.oaf.Country' | translate }}</label>
      <ng-select
        #country
        [items]="countries"
        bindLabel="name"
        bindValue="id"
        placeholder="{{ 'labels.commons.Select Country' | translate }}"
        formControlName="countryId"
        aria-labelledby="country"
        (change)="search($event)"
        [virtualScroll]="true"
      >
      </ng-select>
    </div>

    <div fxFlex="50%">
      {{ 'labels.oaf.Organization Units' | translate }}:
      <mifosx-country-tree-view
        *ngIf="treeDataSource?.length > 0"
        [treeDataSource]="treeDataSource"
        (checkedOffices)="getCheckedUnits($event)"
      >
      </mifosx-country-tree-view>
    </div>
  </div>

  <div fxLayout="row" class="margin-t" fxLayout.xs="column" fxLayoutAlign="center" fxLayoutGap="2%">
    <mat-form-field fxFlex="100%" fxFlex.xs="100%" fxFlex.sm="50%">
      <mat-error *ngIf="!isCountryHasActiveCurrency">
        {{ 'labels.oaf.No Active Currency' | translate }} <strong>{{ countryName }}</strong>
      </mat-error>
      <mat-label>{{ 'labels.inputs.Currency' | translate }}</mat-label>
      <input
        matInput
        formControlName="currencyCode"
        [value]="loanProductsTemplate?.currencyCode"
        [readonly]="true"
        disabled
      />
    </mat-form-field>
  </div>

  <div fxLayout="row" class="margin-t" fxLayout.xs="column" fxLayoutAlign="center" fxLayoutGap="2%">
    <mat-form-field fxFlex="50%">
      <mat-label>{{ 'labels.oaf.Digits After Decimal' | translate }}</mat-label>
      <input type="number" matInput formControlName="digitsAfterDecimal" required />
    </mat-form-field>
    <mat-form-field fxFlex="50%">
      <mat-label>{{ 'labels.oaf.In Multiples Of' | translate }}</mat-label>
      <input type="number" matInput formControlName="inMultiplesOf" required />
    </mat-form-field>
  </div>

  <div fxLayout="row" class="margin-t" fxLayout.xs="column" fxLayoutAlign="center" fxLayoutGap="2%">
    <button mat-raised-button matStepperPrevious disabled>
      <fa-icon icon="arrow-left"></fa-icon>&nbsp;&nbsp;
      {{ 'labels.buttons.Previous' | translate }}
    </button>
    <button mat-raised-button matStepperNext>
      {{ 'labels.buttons.Next' | translate }}&nbsp;&nbsp;
      <fa-icon icon="arrow-right"></fa-icon>
    </button>
  </div>
</form>
