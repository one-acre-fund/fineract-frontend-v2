<div class="container m-b-20" fxLayout="row" fxLayoutAlign="end" fxLayoutGap="20px">
  <button mat-raised-button color="primary" [routerLink]="['create']" *mifosxHasPermission="'CREATE_TEMPLATE'">
    <fa-icon icon="plus"></fa-icon>&nbsp;&nbsp;{{ 'labels.buttons.Create Template' | translate }}</button>
</div>

<div class="container">

  <div>
  <form class="search-form" *ngIf="templateSearchForm" [formGroup]="templateSearchForm">
  <div fxLayout="row" fxLayoutGap="20px">
    <div fxFlex="calc(33% - 1rem)">
      <ng-select
        #templateEntity
        [items]="entityAndTypesTemplateData.entities"
        bindLabel="name"
        bindValue="code"
        placeholder="{{ 'labels.inputs.Entity' | translate }}"
        formControlName="templateEntity"
        aria-labelledby="entity"
        [virtualScroll]="true"
      >
      </ng-select>
    </div>

    <div fxFlex="calc(33% - 1rem)">
      <ng-select
        #templateType
        [items]="templateTypes"
        bindLabel="name"
        bindValue="code"
        placeholder="{{ 'labels.inputs.Type' | translate }}"
        formControlName="templateType"
        aria-labelledby="type"
        [virtualScroll]="true"
      >
      </ng-select>
    </div>

  <div fxFlex="calc(33% - 1rem)">
    <mat-checkbox formControlName="activeTemplates" #activeTemplates labelPosition="after">{{ 'labels.commons.includeOnlyActiveRecords' | translate }}
    </mat-checkbox>
  </div>
  </div>
</form>
</div>

  <div class="mat-elevation-z8">

    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="entity">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Entity' | translate }}</th>
        <td mat-cell *matCellDef="let template"> {{ template.entity }} </td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Type' | translate }}</th>
        <td mat-cell *matCellDef="let template"> {{ template.type }} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Name' | translate }}</th>
        <td mat-cell *matCellDef="let template"> {{ template.name }} </td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Status' | translate }}</th>
        <td mat-cell *matCellDef="let template">
          <div [className]="template.active | statusLookup">
            <fa-icon
              matTooltip="{{ template.active ? 'Active' : 'Inactive' }}"
              matTooltipPosition="right"
              icon="circle"
              size="lg"
            ></fa-icon>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [routerLink]="[row.id]" class="select-row"></tr>

    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>

  </div>

</div>
